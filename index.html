<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png" />
    <link rel="manifest" href="/favicons/site.webmanifest" />
    <meta name="msapplication-config" content="/favicons/browserconfig.xml" />
    <meta name="theme-color" content="#C2410C" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SMSL7R3897"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-SMSL7R3897');
    </script>
    <meta name="description" content="Viglet — Open Source Tools for Enterprise Intelligence" />
    <title>Viglet</title>
    <!-- Open Graph / Twitter — home defaults. The prerender plugin overrides
         og:title / og:description / og:url / og:image + twitter:image per route,
         pointing at the build-time cards in /og/ (see scripts/og-images.mjs). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Viglet" />
    <meta property="og:title" content="Viglet — Open Source Tools for Enterprise Intelligence" />
    <meta property="og:description" content="Data extraction, content management & semantic search — open source, self-hosted with Docker." />
    <meta property="og:url" content="https://www.viglet.org/" />
    <meta property="og:image" content="https://www.viglet.org/og/home.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Viglet — Open Source Tools for Enterprise Intelligence" />
    <meta name="twitter:description" content="Data extraction, content management & semantic search — open source, self-hosted with Docker." />
    <meta name="twitter:image" content="https://www.viglet.org/og/home.png" />
    <!-- FAQPage structured data — helps search engines and LLM assistants
         answer high-intent questions about the Viglet suite (open-source
         enterprise search / data extraction / CMS for Adobe AEM & WordPress).
         MIRRORS src/data/narrative.ts `faq[]` VERBATIM — the home FAQ section
         (W26) renders the same Q&A visibly, so structured data matches on-page
         content. If you edit one, edit both. The prerender plugin keeps this
         block on the home route only. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Do I need all three products?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Each product runs independently — Turing ES for search and AI, Dumont DEP to feed it content, and Shio CMS to model and serve content. They're stronger together, but there's no lock-in and no required bundle."
            }
          },
          {
            "@type": "Question",
            "name": "Which Viglet product do I need?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Match the product to the job: Dumont DEP extracts and moves data (indexing, ETL, connectors); Shio CMS models and serves content (headless CMS, sites); Turing ES searches and answers (enterprise search, semantic navigation, AI chatbot)."
            }
          },
          {
            "@type": "Question",
            "name": "Is Viglet a free, open-source alternative to Algolia, Coveo or Lucidworks?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Viglet Turing ES is open-source enterprise search under the Apache 2.0 license. You self-host it on your own infrastructure with no per-document or per-query pricing, while getting faceted search, semantic/vector search and generative AI (RAG) in a single platform."
            }
          },
          {
            "@type": "Question",
            "name": "How do I run it?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "One Docker command per product, pulling the image from the GitHub Container Registry (ghcr.io). The runtime is bundled inside the container — no Java install and no manual setup. A managed Viglet Cloud option is on the roadmap."
            }
          },
          {
            "@type": "Question",
            "name": "Which sources can I index — Adobe AEM, WordPress, databases?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Adobe AEM, WordPress, SQL databases, file systems and any website via the web crawler are supported through Viglet Dumont DEP, delivered into Apache Solr, Elasticsearch or Turing ES."
            }
          },
          {
            "@type": "Question",
            "name": "Does it support semantic search and RAG with the LLM of my choice?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Turing ES bundles vector/semantic search and Retrieval-Augmented Generation with the LLM of your choice — OpenAI/ChatGPT, Ollama, Anthropic or Google Gemini — on SaaS or on-premises. Answers are grounded in your indexed content with citations."
            }
          },
          {
            "@type": "Question",
            "name": "Where is my content stored?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "On your own infrastructure. Every product is self-hosted via Docker, so indexed content and user queries never leave your perimeter — important for regulated industries with data-residency requirements, unlike SaaS search where content lives in the vendor cloud."
            }
          }
        ]
      }
    </script>
    <!-- SPA redirect on GitHub Pages -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect
        delete sessionStorage.redirect
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect)
        }
      })()
    </script>
  </head>
  <body>
    <script>
      (function() {
        var t = localStorage.getItem('theme') || 'system';
        if (t === 'system') t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
